server.port=8080
spring.application.name=wishlist
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
# Conexão MongoDB (Spring Boot 4)
# No Compass: database = wishlist | collection = wishlists
spring.mongodb.host=${DB_HOST:databasedev}
spring.mongodb.port=${DB_PORT:27017}
spring.mongodb.database=${DB_DATABASE:wishlist}
spring.mongodb.username=${DB_USER:adim_user}
spring.mongodb.password=${DB_PASS:SuasenhaFortaAqui}
spring.mongodb.authentication-database=admin
spring.data.mongodb.auto-index-creation=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
